body:
  text: 論曰有法能起摩訶衍信根是故應説述曰次下第二明正宗分於中有二初舉益許説後正解所説此初也言論曰者簡論異經辨能詮教有法等者舉所詮法顯有勝益簡論異經辨能詮教者答論自別經自別論則賤論只是教經則甚深理所以此論各自別所以言者簡論異經辨能詮教論只能詮教有法等者舉所詮法論則能詮教有法等者所詮道理則名能詮所詮此教則能詮理已能詮教教則能詮理故云能詮所詮有法能起摩訶衍是故應説答摩訶衍者問是衆生大乘心答有衆生於大乘能起信心則是顯能有大勝益事是故者顯能詮教應頭説也能詮教有此所詮一心二門三大等法能起衆生大乘信根此能詮教決定應説大乘信者即信己性知心妄動無前境界答則信己性則信自許身中心真如共佛一種則知心動無前境界中則能猛利永不轉此信決定能持能長自及餘善故名信根問何名能持能長答若有衆生信則能增長一切善行故名自及餘善猶如養一箇小樹若養得根拔苗自成就故名能持能長故名信根論説有五分述曰次下第二正陳所説於中有三初舉數總標次依數列名後依名辨相此初也論云何為五至勸修利益分最下文是也為鈍根舉益勸修行也述曰此依數列名也言不自起製必有由名為因緣彰別餘段故稱為分問有何由答夫事有因是發起因事發事有一箇人語無事不語皆有因緣是發語彰別餘段故稱為分者一段一段義也亦名一段別義者箇義則箇義則別故名彰別餘段故稱為分由致既興略標綱要令物生信答綱者大綱望是一箇要事故名綱要名立義分宗要既略次宜廣釋令其生解名解釋分依釋生解次宜起行令起行故名修行信心分修行信心下所謂四五行信謂信根本行謂五行及至觀等是也雖是行儀鈍根懈慢舉益勸修名勸修利益分論初説因緣分述曰次下第三依名辨相別釋五分即分為五初因緣中復分為二初標舉分名後別顯其義此初也言因緣者是所以義所為義發起義是因緣義論問有何因緣而造此論答曰是因緣有八種云何為八述曰下答有三初舉數總答次依數辨義後結答所問此初也論云何為八一者因緣總想所謂為令衆生離一切苦得究竟樂非求世間名利恭敬故述曰次下第二依數辨義別辨八因即分為八於中初一是總相因其後七種是別相因言總相者有其三義一通諸論而作所以答通諸論而作所者次一段義通一切十二部經總言謂令衆生離一切苦得究竟樂二通諸根而作所為非唯彼不定聚故三通諸分而作發起非唯正作立義因故解釋有三種云何為三一者顯示正義二者對治邪執三者分別發趣道相顯示正義者正釋所立大乘法義所顯非邪故名正義以教辨明故名顯示正理既陳情惑斯遣答若見道理情惑則除答情惑者則是妄相也妄相情有理無故名情惑斯遣第二對治邪執二見妄著故名邪執答何名為邪執一者人我執二者法我執以教令除名曰對治答對者可破壞故可對治故皆不可壞問何者是對治答我見人見皆妄執妄執皆妄相不可壞故故名可破壞故邪執既除依階趣正故有第三發趣道相本覺虛通目之為道問何者是本覺答本覺者根本真如在凡時則是本覺若知後成佛則名始覺因之為道者答目亦名心眼亦名定惠道者則無分別平等一如起行向之名為發趣問起行向之向何處去答只取無上菩提過去佛亦行此道德成正覺未來佛亦行此道德成正覺趣之狀名之為相似教宣示名為分別論顯示正義者依一心法有二種門述曰次下第三依名辨相辨此三名即分為三初釋第一顯示正義復分為二初總釋釋上總立復即別釋釋上別意初總釋中復分為三初依法開門二初其二門三二門該攝此初也緣分為三初依法門者一總源心如來藏心也含其二義謂如來藏一總源心含其二義一約體絶相門謂一心性非染淨等無差別諸相經依此説衆生即涅槃煩惱即菩提凡夫彌勒同一如等答煩惱則是真如衆因只由因以復得佛果故言衆生即涅槃煩惱即菩提凡夫彌勒同一如等二隨緣起滅門隨無明熏變成染淨染淨雖成染淨性恆不動正由不動能成染淨是故不動亦在動門則生滅本覺義也答正由不動能成染淨答猶如水體正住則是波正波時則是皆不失水性是故不真如妄相發妄相是故真如界作用猶水正波是水作用水正住時是波體依此經説不染而染染而不染又説如來藏為善不善因若生若滅受苦樂等然此二門舉體通融體無二齊限不分假名為一者是諸答齊限不者此真實上染亦不可德得亦不德一亦不立異亦此是絶相門教故言假名為一一亦不可德法中真實之性性有智故説名為心非謂虛實一心等也緣此是故諸法中真實之性從使被妄相熏動本水性恆不失是故雖與諸波作體性不被而有妄變故真實之性論云何為二一者心真如門二者心生滅門述曰此列二門也即體絶相名真如門隨緣變動名生滅門體雖無別而義有異約義異故故説為門答真如生滅舉體則是一義若舉生滅則有二門故説為門論是二種門皆各總攝一切法述曰此下二門説攝於中有二初正顯後釋成此初也即釋立中是心即攝世間法等答等者等取真如生滅二門説攝世門則是生滅出世門者則是真如故言等上以一心説二門是染淨通相通相之外無別是故染淨染淨皆為通相所攝故真如門總攝諸法生滅門者即此真如與緣和合變作染淨而恆不失本真如性故別相門亦攝真如是故亦攝一切法也論此義云何以是二門不相離故述曰此釋成也此云何者二門若別不可相從如本一心未容皆攝如何二門各總攝耶故次答云以是二門不相離故以真如門是心理體生滅門者是心事相以彼理事不相離故舉理攝事舉事攝理故説二門皆各總攝答舉水則是波故波則是水是故二門皆各總攝答曰若知一切法雖説無有能説可説雖念亦無能念所念是名隨順若離於念名為得入復次真如者依言説分別有二種義問何者則依言説分別答真如無言説利四句絶百非所以順言語便則執著分別所言者依言説分別論云何為二一者如實空以能究竟顯實故二者如實不空以有自體具足無漏性功德故述曰此開章略辨也言如實者真體不無故所言空者真體無妄故究竟顯實者由無極顯真故以無妄故能極顯實故説如實名為空也問何者極猶如水清石子現一切塵域不住是名極顯言不空者是體相故此性功德言無漏者無離斷等及念漏故是即如實具有自體及性功德故名不空論所言空者從本已來一切染法不相應故謂離一切法差別之相以無虛妄心念故述曰次下第三依章廣釋於中有二先明其空復顯不空初中有三初略明次廣釋後總結此初也初句顯其非染相應以釋空義一切染法不相應故故名為空云何染法不相應耶次句釋云謂離差別所相故何故離此所取相耶後句釋云以無能取妄心念故即妄心境情有理無真體相理有情無無故與染法不相應也論當知真如自性非有相非無相非非有相非非無非有無俱相非一相非異相非非一相非非異相非一異俱相答當真如自性非有相非無相衆生便著非有非無將真如體非非有相非非無非有無俱相衆還著非非有無俱相將作真如非一相非異相非非一相非非異相非一異俱相衆生還著隨言將作真如皆不相應論乃至總説依一切衆生以有妄心念念分別皆不相應故説為空述曰此下總結於中有二初順結前義後返結釋疑此初也妄染塵沙難不遍舉今總略説一切妄心所不染觸故説空也答妄染塵沙者妄相猶如塵沙一衆不可遍舉今總略説一切妄心所不染觸故説空也空者表妄得名也論若離妄心實無可空故述曰此返結釋疑也恐明説空便成斷滅故此釋云遮諸念相假説為空若不遮妄不説空故真既不空故非斷滅是故顯真性空而不空論所言不空者已顯法體空無妄故述曰此下第二顯不空義於中有三初牒前空由明妄空方顯不空真實體故論即是真心至常恆不變淨法滿足則名不空述曰此正明不空也即是真心者空無妄即是真心總舉不空真心體大不生故常不死故恆我故我者自在義猶如大海不變無念故淨法滿足性德雖多舉其四即是不真心相大具此體相即名不空論亦無有相可取以離念境界唯證相應故述曰此釋外疑也恐不空疑存有相故念遮云雖曰不空無有相而可執取下釋所以非妄念所行境界唯是證智所體會故即顯真心不空而空也論心生滅者依如藏故有生滅心所謂不生不滅與生滅心和合述曰上來已釋真如門竟次下第二釋生滅門於中有二先生滅心法後辨所示之義初中有二先明生滅相資於中有二先體就總標後依義別解總中有三初標體次辨相後立名此初也如來藏者即是清淨不生滅心無明熏舉體動作生滅心也答如來藏者於生滅門語論所謂不生不滅與生滅和合非一非異述曰此辨相也如來藏不生滅心舉體故不離生滅生滅心相無非真故故亦不離不生滅心如是不離名為和合但是不生滅與生滅和合以是向末隨緣門故非是生滅與不生滅和合以非向本歸真門故非一異者不生滅心答向末則鈍是生滅無鈍淨真如向本歸真如者亦是鈍淨真如答真如與生滅相和是得成和合義故言不非一異全體動故心與生滅非異而恆不失真如心性故心與生滅不一若定一者生滅盡時真心應滅即墮斷邊若定異者無明熏時心應不動即墮常邊既離二邊故非一異非一異故方成和合論名為阿黎耶識述曰此立名也依如來藏故有生滅心等者名為阿黎識阿黎耶者訓翻無沒謂如來藏不生滅心雖隨無明而成生滅如來藏體無滅沒故功德相無失沒故法身妙用無隱沒故此三箇是前體大相大用大也正名阿賴耶義答黎耶賴耶義則是一只猶語昔經重有異譯為藏所成生滅而為所熏與前七識為因果故能藏諸法於自體中藏自體於諸法之中又為我愛之所執藏我見所攝故名為藏離我見時無此名故到七地菩薩為業識盡故不執我故則得阿耶名任運自在若唯生滅不異七識若唯不生滅不異如來藏由二和合成黎耶矣若是阿黎識是七識家因果第八識所攝故故第八識為因果也此前七識第八阿黎識得坐故為因果也亦名為主此八識鈍是生滅故只名阿識不名為藏若如來藏向歸真門故故名藏亦攝藏一切生滅不生滅三大等義攝在其中故名為藏上開章中直言覺不覺覺者本覺衆性不覺者則屬始覺隨緣門中隨緣門者生賊也答覺者約性德論一切衆生本覺真如共諸佛體性一種難曰一種未起智照則言覺義則屬性德覺者對染翻得名下文則言本覺者因此性德能成果位則是名本却歸本源當顯始覺法身是故德本覺名故此明本覺以了此則明始覺也論始覺義者對本覺義述曰此略明始覺也言始覺者牒其名也依本覺故有不覺者明起始覺之所由也依不覺故説有始覺者正顯所起始覺之義謂即本覺真淨心體隨無明緣動作妄念故依本覺有不覺也而以本覺內熏力故漸有微覺起厭求等乃至究竟還同本覺故依不覺有始覺也論又以覺心源故名究竟覺不覺心原故非究竟覺述曰上略明二覺次下第二廣顯二覺於中有二先明始覺後顯本覺前中有三初總標因果滿非滿覺次廣寄四相釋成其義後顯始覺不異本覺此初也言心源者有其二義本覺真如為染心源業相細念為諸染源持業依主二釋皆通謂究竟位覺本覺心本無所動今無所靜覺業識心本來無生今無所減覺此源者名究竟覺即佛果位縱有所覺未至此源非究竟覺即等覺前也論若得無念者則知心相生住異滅以無念等故述曰此顯覺者之德若妄未息不知一心本無相念若至心源得於無念則知衆生體即無念佛無念體與彼平等故能遍知諸念無念答前文四相於漸覺位門則言衆未至究竟覺只緣無明未盡真如門中本無相念亦本覺不覺只緣妄未息不知一心本無相念答若一切衆生若未息共佛體玄隔所以不知佛體無念若至本真如心源得於無念則知衆生體即無念佛無念體與衆生體平等無別故知一切諸念本來無念論而實無有始覺之異以四相俱時而有皆無自立本來平等同一覺故述曰此即第三始不異本文中標釋而實無有始覺異者此標始覺不異本覺以四相下釋成四義以彼四相無別自體可辨前後故言俱時答真如中更無有別地四可得故言俱時只依細念覺時有差別而有前後故言而有離心無有俱時前後自性可立故言皆無自立離心無性即同一覺故言本來同一覺等此總意云既覺四相説為始覺所無故能覺亦無故無覺異於本覺論復次本覺隨染分別生二種相與彼本覺不相捨離述曰廣始覺竟下廣本覺於中有二先明隨染本覺後顯性淨本覺故言本覺隨染分別既隨緣動故言生雖隨緣生不失性淨故言與彼不相捨離此所隨染既有二種故隨此染生下二相言二染者一謂自染即在因時由無明熏所起染相二謂他染即在果時與生同體答同體與衆生同體也諸衆生染即依自染生智淨相以説從染得智淨故由他染生不思業以化染生起勝業故論云何為二一者智淨相二者不思議業相述曰此列名也所言智者即始覺智淨謂離染同於本覺果德作用故名為業助下地測名不思議相者狀也覺隨染有此當起二相狀故論智相者謂依法力熏習如實修行滿足方便述曰次下第三依名辨相於中有二先明智淨相後顯不思業相智中有二初直明淨相後問答釋然前中亦二先因後果此因也謂於地前依真如法內熏之力所流教法外聞力能修資糧加行善根故言依法力熏習若登地上契證真如凡起諸行依真而修故言如實修行漸漸修習超十地行至金剛位因行既極名滿足方便答滿足則是方便則是滿足家之方便也論復次覺體相者有四種大義與虛空等猶如淨鏡述曰自下第二性淨本覺於中有二初總標後別釋此初也前明本覺隨動之門故説隨染今明本覺不動之故説性淨此二本既無別體是顯本覺不動而動而不動也答波不離水水不離波正波時不離水所以生滅則是真如真如則是生滅體非一故故説不動而動動而不動也以覺體有四大淨義故與空等猶如淨鏡本覺四義下文當説空四義者第一空無一相能含一切物答第一空無一相能含一切物者答一切衆生體有垢故色像則不現故言空無一相則能含一切物答衆生體若淨也一切世間境界悉於中現猶如於鏡鏡若有垢色像不現鏡若淨一切色像悉於中現問第二空義離垢顯淨空示現一切物答衆生心若離垢則能示現一切物世間境界悉於中現答衆生心者猶如虛空虛空中若無雲無風塵則能一切間境界悉於中現亦如淨鏡問第三之空義鏡四義者答空無外物體含衆像出垢諸塵垢現像為物用答空無外物者只是真如體中本來無妄相妄相人真如體不得只緣無妄故一切境界向真如心上現來故云體含衆像出離諸塵垢現像為物用者答衆若干種心總向真如心上現來隨衆生心示現萬化皆能利益一切衆生故名為物用答第四空義了由此空鏡以況於真猶如龜毛不現鏡中妄法亦示真如體上本來無妄故言無法可現無可現故心境妄法望於本覺非所覺照覺望心境非能覺照所照既無能照無故故言非覺照義也此顯無有遍計所執實質可現非覺照答遍計所執者一切衆著一切境界種種分別者則是真如者則是無明也故言遍計所執真如法中覺所覺亦不可德皆總是妄故言非覺照義故實質可現者如真法中無有一箇實質所現猶如鏡中妄法不現妄法總是虛幻實質者猶如實一箇妄法則言實質所現猶如鏡中妄法不現故言非覺照義下言境界於中現者準生滅門中覺中似有妄法依他似現亦不相違答他者妄也故言依他似現亦不相違也論二者因熏習鏡謂如實不空一切世間境界悉於中現不出不入不失不壞常住一心以一切法即真實性故又一切染法所不能染智體不動具足無漏熏衆生故述曰此第二義也因熏鏡者標其名也能生覺果名之為因此能內熏故名熏習能現諸法故謂之鏡次下辨相文有三節謂如實不空者出因體也以有無漏性功德相真實體故故云如實不實如真異不言也由不空故方能作彼始覺正因故不空者成因義也以一切下釋其鏡義謂一切法離此心外無別體性猶如鏡中能現影也答能影者猶如清淨水中能現波相雖現波相亦不壞清淨水性真如是妄法中言不出者明心待熏變現諸法而非自出所變餘不出心故言入者謂心隨緣熏變現諸法故言此心能攝一切法縱使隨緣變動亦不異真如縱使變壞作生滅去亦不異真如明日為熏成佛去時亦不異真如此心一切真如生滅家因體也雖見影染體故言不失者此皆真作體能諸法染淨法也雖作生滅後動真性不可德論染心者有六種述曰次顯染心緣起之相於中有二初總標後別釋此初也此即釋上無明所染有染心句前文所言無明所染有其染心此染心者有其六種然其六染即上意識及五種意前明依因緣起義故從細至麁而説次第今欲兼辨治斷義故從麁至細次第而明故初第一執相應染第六根本業不相應染也論云何為六一者執相應染依二乘解脫及信相應地遠離故及者兼三賢菩薩此二乘得二空門因力修未證真如故言信相應地述曰次下別別釋六染即分為六問何者是六染答前文五種意今兼取第識則名六染也前文五意則從細至麁今兼辨治斷義從麁至細從凡至聖分分煩惱有麁有細麁為分別細為俱生因此有麁有細細煩惱十地菩薩是能斷若是麁惡煩惱凡夫能斷問何者是麁如殺生切溢應是猛利麁惡煩惱凡夫若發心所是麁惡煩惱總能斷故言凡夫能斷也故言下下品煩惱上上品能上上品煩惱者則是十地菩薩故言凡夫能斷也此中第一執相應染即上意識我我所等麁執俱起名執相應忿污淨心名之為染此及下二之義如下所明相應若二乘人至無學位見修煩惱究竟能離故此第一染菩薩人住信相成就無有退失名信相應此位菩薩得人空門見愛煩惱不現行問何者現行一切上上煩惱不起故曰不現行雖不現行種子未正遇緣則起也故云遠離非離隨眠問何者隨眠答二乘人強押伏煩惱種子阿黎耶識中隱在猶如有眠臥時不煩惱不起忽然教時煩惱還在過緣忽起者猶如種子未正故曰隨眠亦如二乘人六識不行修得無色界定則生無界中八萬大劫在於定中福盡還墮於地獄何以故此先修定時有惡願故於雖得定生無色界無猶先業惡業隨於身行種未亡故問有何惡願答先境之中修定時在一樹下坐其樹一切非矛作聲則向水可邊坐其水里切蟲還作聲則起惡願言願我捨此身作非矛惡夜叉若非時食噉切非矛蟲若入水則食噉一切水里蟲雖得定以善業因緣生無色天八萬劫在其中以惡願力故其中福盡還墮於地獄還作夜叉故曰隨眠種未亡故意在於此也故遠者煩惱則離也惡業種子等正故曰隨眠意在於此也此第義了論二者不斷相應染依信相地修學方便漸漸能捨得淨心地究竟離故述曰此言不斷相應染者即五意者從麁二相續識也中名相續法執相續名為不斷塵污淨心故名為染初住已上三賢菩薩修學唯識尋思實智何名唯識唯者離四句絶百非真如名亦粗斷彼正故曰唯識問何者尋思實智答實者了了智世間法非總不所德猶幻無一所實故名尋思實智亦名親證真如方便者體正故曰方助道曰故便漸伏如是法執分別若一切隨眠種正故但曰俱正得地上無漏淨心證三無性遍滿真如法執分別種現俱正故淨心地究竟離也論三者分別智相應染依具戒地漸離乃至無相方便地究竟離故述曰即五意中名為智識念慮染淨名分別智猶分別此則是淨此則是染故曰慮也亦分別智污淨心故名之為染從第二地至第六地入觀緣理分別時分分能除故云漸離若至七地長時入觀故此法執永不現行猶數數須作意不作則恐失念猶有作意法執在未能得任運故曰法執也第三地猶有分別染淨此則淨法此則染法此分別智也問離何分別只離分別此則是法此則是染法到第六地入觀緣理離分別時故分分能除故云漸離若至七地長時入觀故此法永不現行名究竟離具戒地者即第二地此地具足三聚淨戒何三聚淨戒答為第三卷經性戒他不犯也故無相方便即第七地常作意住無相觀故四者現色不相應染依色自在地能離故述曰即五意中第三現色識動心現境名為現色能污淨心名之為染相應義如下所明八地能得相云自在色性隨心名色自在能澄相土自在真如菩薩到八地任運自在八地以前所智惠依無明起若至八地一切所起智惠從真如起故自在所變他自在或變大海變成𦼼樂或變大地為金餘色故曰相土自在或變身為滿虛空或變身如界子或生畜生中或生人中為他衆生故隨意受生故名自在或一字中説一切法或一説故名如現色境用從真而起無妄境界從此永離故説現染此地能離論五者能心不相應染依心自在地能離故述曰此五意中第二轉識依於動心成能見污淨心故名能見染至第九地得無礙智善知衆生心行稠林自他無礙名心自在無明礙心永不現行故能離也
